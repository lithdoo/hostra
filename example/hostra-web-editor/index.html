<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hostra web editor example</title>
    <link rel="stylesheet" href="/web-editor/web-editor-component.css" />
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #0b1220;
      }
      #root {
        height: 100%;
      }
      code-editor {
        display: block;
        height: 100%;
      }
    </style>
    <script type="module" src="/web-editor/web-editor-component.js"></script>
  </head>
  <body>
    <div id="root">
      <code-editor
        language="typescript"
        lsp-url="ws://127.0.0.1:3001/lsp"
        value="function greet(name: string) {
  return `hello, ${name}`;
}

const x: number = greet('hostra');"
      ></code-editor>
    </div>
  </body>
</html>
